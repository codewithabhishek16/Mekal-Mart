<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Control Center | Mekal Mart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1B4332',
                        secondary: '#219EBC',
                        action: '#FFB703',
                        bglight: '#F9FBFF',
                        ink: '#023047',
                        igntu: {
                            navy: '#1B4332',
                            gold: '#FFB703',
                            dark: '#112d22',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                        outfit: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f051d 0%, #023047 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen px-4 py-8">
    <div class="glass-card p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-md relative overflow-hidden">
        <!-- Background decorative gradients -->
        <div class="absolute -top-20 -right-20 w-60 h-60 bg-purple-500/10 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute -bottom-20 -left-20 w-60 h-60 bg-red-500/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="text-center mb-8 relative">
            <div class="mx-auto w-20 h-20 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl flex items-center justify-center shadow-lg mb-4 overflow-hidden p-2">
                <img src="logo.png" alt="Mekal Mart Logo" class="w-full h-full object-contain">
            </div>
            <h2 class="text-3xl font-black font-outfit text-white tracking-tight">Admin Gateway</h2>
            <p class="text-slate-400 text-xs mt-1 font-bold uppercase tracking-widest">Mekal Mart Operations Control</p>
        </div>

        <!-- Login Form Wrapper -->
        <div class="space-y-4">
            <!-- Email Address -->
            <div class="space-y-2">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Admin Email Address</label>
                <input type="email" id="auth-email" placeholder="e.g. admin@mekalmart.com" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 text-white rounded-xl text-sm font-bold focus:outline-none focus:ring-4 focus:ring-purple-500/20 transition">
            </div>

            <!-- Password Input -->
            <div class="space-y-2">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Password</label>
                <input type="password" id="auth-password" placeholder="Enter administrative password" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 text-white rounded-xl text-sm font-bold focus:outline-none focus:ring-4 focus:ring-purple-500/20 transition">
            </div>

            <!-- Action Button -->
            <button type="button" onclick="handleAdminLogin(event)" id="btn-auth-action" class="w-full py-4 bg-gradient-to-r from-purple-500 to-indigo-600 text-white hover:shadow-lg rounded-2xl font-montserrat font-bold shadow-md transition-all transform hover:-translate-y-0.5 active:scale-95 text-base flex items-center justify-center gap-3">
                <i class="fa-solid fa-right-to-bracket text-lg text-white" id="auth-btn-icon"></i>
                <span id="auth-btn-text">Verify & Login</span>
            </button>

            <!-- Back to Main Portal Link -->
            <div class="text-center mt-4">
                <a href="login.html" class="text-xs text-slate-500 hover:text-white hover:underline transition">
                    <i class="fa-solid fa-arrow-left mr-1"></i> Back to Main Portal
                </a>
            </div>

            <!-- Message Status -->
            <p id="msg" class="text-center text-rose-500 mt-6 text-sm font-semibold min-h-[20px]"></p>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        function showMessage(text, isError = true) {
            const el = document.getElementById('msg');
            el.innerText = text;
            el.className = isError ? "text-center text-rose-500 mt-6 text-sm font-semibold min-h-[20px]" : "text-center text-emerald-400 mt-6 text-sm font-semibold min-h-[20px]";
        }

        async function handleAdminLogin(e) {
            if (e) e.preventDefault();
            
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            const btnText = document.getElementById('auth-btn-text');
            const btnIcon = document.getElementById('auth-btn-icon');
            const btn = document.getElementById('btn-auth-action');

            if (!email) return showMessage("Please enter your admin email!", true);
            if (!password) return showMessage("Please enter your admin password!", true);
            
            const originalText = btnText.innerText;
            btnText.innerText = "Verifying...";
            btnIcon.className = "fa-solid fa-spinner fa-spin text-lg text-white";
            btn.disabled = true;
            showMessage("", false);

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, selected_role: 'admin', password: password })
                });
                const data = await res.json();
                
                if (res.ok && data.status === 'success') {
                    showMessage("Login successful!", false);
                    localStorage.setItem('uniMartToken', data.token);
                    localStorage.setItem('uniMartActiveUser', JSON.stringify(data.user));
                    localStorage.setItem('uniActiveRole', data.user.role);
                    
                    setTimeout(() => {
                        window.location.href = 'admin_dashboard.html';
                    }, 1000);
                } else {
                    showMessage(data.detail || data.message || "Invalid admin credentials.", true);
                    btnText.innerText = originalText;
                    btnIcon.className = "fa-solid fa-right-to-bracket text-lg text-white";
                }
            } catch (err) {
                showMessage("Connection error. Please try again.", true);
                btnText.innerText = originalText;
                btnIcon.className = "fa-solid fa-right-to-bracket text-lg text-white";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
