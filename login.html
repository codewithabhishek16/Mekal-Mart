<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Login Gateway | Mekal Mart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1B4332',
                        secondary: '#219EBC',
                        action: '#FFB703',
                        bglight: '#F9FBFF',
                        ink: '#023047',
                        igntu: {
                            navy: '#1B4332',
                            gold: '#FFB703',
                            dark: '#112d22',
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif'],
                        outfit: ['Montserrat', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #091e15 0%, #112d22 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .role-card {
            border: 2px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .role-card.active {
            border-color: #FFB703;
            background: rgba(255, 183, 3, 0.1);
            box-shadow: 0 0 20px rgba(255, 183, 3, 0.15);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen px-4 py-8">
    <div class="glass-card p-6 md:p-8 rounded-3xl shadow-2xl w-full max-w-2xl relative overflow-hidden">
        <!-- Background decorative gradients -->
        <div class="absolute -top-20 -right-20 w-60 h-60 bg-teal-500/10 rounded-full blur-3xl pointer-events-none"></div>
        <div class="absolute -bottom-20 -left-20 w-60 h-60 bg-[#FFB703]/10 rounded-full blur-3xl pointer-events-none"></div>

        <div class="text-center mb-8 relative">
            <div class="mx-auto w-20 h-20 bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl flex items-center justify-center shadow-lg mb-4 overflow-hidden p-2">
                <img src="logo.png" alt="Mekal Mart Logo" class="w-full h-full object-contain">
            </div>
            <h2 class="text-3xl font-black font-outfit text-white tracking-tight">Mekal Mart Gateway</h2>
            <p class="text-slate-400 text-xs mt-1 font-bold uppercase tracking-widest">Select your login portal to continue</p>
        </div>

        <!-- Role Gateway Grid -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-8">
            <div onclick="selectRole('student')" id="role-student" class="role-card p-4 rounded-2xl cursor-pointer text-center flex flex-col items-center justify-center gap-2 hover:border-slate-400">
                <div class="w-10 h-10 rounded-xl bg-blue-500/10 text-blue-400 flex items-center justify-center text-lg">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <span class="text-xs font-black text-white uppercase tracking-wider">Student</span>
            </div>
            
            <div onclick="selectRole('vendor')" id="role-vendor" class="role-card p-4 rounded-2xl cursor-pointer text-center flex flex-col items-center justify-center gap-2 hover:border-slate-400">
                <div class="w-10 h-10 rounded-xl bg-orange-500/10 text-orange-400 flex items-center justify-center text-lg">
                    <i class="fa-solid fa-store"></i>
                </div>
                <span class="text-xs font-black text-white uppercase tracking-wider">Vendor</span>
            </div>

            <div onclick="selectRole('partner')" id="role-partner" class="role-card p-4 rounded-2xl cursor-pointer text-center flex flex-col items-center justify-center gap-2 hover:border-slate-400">
                <div class="w-10 h-10 rounded-xl bg-green-500/10 text-green-400 flex items-center justify-center text-lg">
                    <i class="fa-solid fa-motorcycle"></i>
                </div>
                <span class="text-xs font-black text-white uppercase tracking-wider">Rider</span>
            </div>

            <div onclick="selectRole('admin')" id="role-admin" class="role-card p-4 rounded-2xl cursor-pointer text-center flex flex-col items-center justify-center gap-2 hover:border-slate-400">
                <div class="w-10 h-10 rounded-xl bg-purple-500/10 text-purple-400 flex items-center justify-center text-lg">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <span class="text-xs font-black text-white uppercase tracking-wider">Admin</span>
            </div>
        </div>

        <!-- Login Form Wrapper -->
        <div class="space-y-4 max-w-md mx-auto">
            <!-- Full Name -->
            <div class="space-y-2" id="name-input-container">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Full Name</label>
                <input type="text" id="auth-name" placeholder="Enter full name" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 text-white rounded-xl text-sm font-bold focus:outline-none focus:ring-4 focus:ring-[#FFB703]/20 transition">
            </div>
            
            <!-- Mobile Number -->
            <div class="space-y-2" id="phone-input-container">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Mobile Number</label>
                <input type="tel" id="auth-phone" placeholder="10-digit phone number" maxlength="10" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 text-white rounded-xl text-sm font-bold focus:outline-none focus:ring-4 focus:ring-[#FFB703]/20 transition">
            </div>

            <!-- Email Address -->
            <div class="space-y-2" id="email-input-container">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1" id="email-label">Campus Email Address</label>
                <input type="email" id="auth-email" placeholder="e.g. name@university.edu" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 text-white rounded-xl text-sm font-bold focus:outline-none focus:ring-4 focus:ring-[#FFB703]/20 transition">
            </div>

            <!-- Password Input -->
            <div class="space-y-2 hidden" id="password-input-container">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Admin Password</label>
                <input type="password" id="auth-password" placeholder="Enter super admin password" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 text-white rounded-xl text-sm font-bold focus:outline-none focus:ring-4 focus:ring-[#FFB703]/20 transition">
            </div>

            <!-- OTP Input -->
            <div class="space-y-2 hidden" id="otp-input-container">
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">6-Digit Verification Code</label>
                <input type="text" id="auth-otp" placeholder="Enter 6-digit code" maxlength="6" class="w-full px-4 py-3 bg-slate-900 border border-slate-800 text-white rounded-xl text-sm font-bold tracking-widest text-center focus:outline-none focus:ring-4 focus:ring-[#FFB703]/20 transition">
            </div>

            <!-- Action Button -->
            <button type="button" onclick="handleAuthAction(event)" id="btn-auth-action" class="w-full py-4 bg-gradient-to-r from-[#FFB703] to-[#E0A102] text-[#023047] hover:shadow-lg rounded-2xl font-montserrat font-bold shadow-md transition-all transform hover:-translate-y-0.5 active:scale-95 text-base flex items-center justify-center gap-3">
                <i class="fa-solid fa-paper-plane text-lg text-[#023047]" id="auth-btn-icon"></i>
                <span id="auth-btn-text">Get Verification Code</span>
            </button>

            <!-- Mock Bypass Login -->
            <div class="text-center hidden" id="mock-login-container">
                <a href="#" onclick="triggerMockLogin(); return false;" class="text-xs text-slate-500 hover:text-white hover:underline">
                    Local Developer Bypass (Mock Login)
                </a>
            </div>

            <!-- Message Status -->
            <p id="msg" class="text-center text-rose-500 mt-6 text-sm font-semibold min-h-[20px]"></p>
        </div>
    </div>

    <!-- EmailJS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="config.js"></script>
    <script>
        let currentRole = 'student';

        document.addEventListener('DOMContentLoaded', () => {
            const mockLoginContainer = document.getElementById('mock-login-container');
            if (mockLoginContainer) {
                if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                    mockLoginContainer.classList.remove('hidden');
                } else {
                    mockLoginContainer.classList.add('hidden');
                }
            }
            if (typeof emailjs !== 'undefined' && PUBLIC_KEY) {
                try { emailjs.init(PUBLIC_KEY); } catch (e) { console.error("EmailJS Error:", e); }
            }
            
            // Set default active tab
            selectRole('student');
        });

        function selectRole(role) {
            currentRole = role;
            
            // Reset UI states
            document.querySelectorAll('.role-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`role-${role}`).classList.add('active');
            
            const nameCont = document.getElementById('name-input-container');
            const phoneCont = document.getElementById('phone-input-container');
            const emailCont = document.getElementById('email-input-container');
            const passwordCont = document.getElementById('password-input-container');
            const otpCont = document.getElementById('otp-input-container');
            const emailLabel = document.getElementById('email-label');
            const authEmailInput = document.getElementById('auth-email');
            
            if (nameCont) nameCont.classList.remove('hidden');
            if (phoneCont) phoneCont.classList.remove('hidden');
            if (emailCont) emailCont.classList.remove('hidden');
            if (passwordCont) passwordCont.classList.add('hidden');
            if (otpCont) otpCont.classList.add('hidden');
            
            document.getElementById('auth-name').value = '';
            document.getElementById('auth-phone').value = '';
            document.getElementById('auth-email').value = '';
            if (document.getElementById('auth-password')) document.getElementById('auth-password').value = '';
            document.getElementById('auth-otp').value = '';
            document.getElementById('auth-btn-text').innerText = "Get Verification Code";
            document.getElementById('auth-btn-icon').className = "fa-solid fa-paper-plane text-lg text-[#023047]";
            showMessage("", false);

            if (role === 'admin') {
                if (nameCont) nameCont.classList.add('hidden');
                if (phoneCont) phoneCont.classList.add('hidden');
                if (passwordCont) passwordCont.classList.remove('hidden');
                emailLabel.innerText = "Admin Email Address";
                authEmailInput.placeholder = "e.g. admin@mekalmart.com";
                document.getElementById('auth-btn-text').innerText = "Verify & Login";
                document.getElementById('auth-btn-icon').className = "fa-solid fa-right-to-bracket text-lg text-[#023047]";
            } else if (role === 'vendor') {
                emailLabel.innerText = "Vendor Email Address";
                authEmailInput.placeholder = "e.g. vendor@university.edu";
            } else if (role === 'partner') {
                emailLabel.innerText = "Delivery Partner Email";
                authEmailInput.placeholder = "e.g. rider@university.edu";
            } else {
                emailLabel.innerText = "Campus Email Address";
                authEmailInput.placeholder = "e.g. student@university.edu";
            }
        }

        function showMessage(text, isError = true) {
            const el = document.getElementById('msg');
            el.innerText = text;
            el.className = isError ? "text-center text-rose-500 mt-6 text-sm font-semibold min-h-[20px]" : "text-center text-emerald-400 mt-6 text-sm font-semibold min-h-[20px]";
        }

        async function handleAuthAction(e) {
            if (e) e.preventDefault();
            
            const email = document.getElementById('auth-email').value.trim();
            const btnText = document.getElementById('auth-btn-text');
            const btnIcon = document.getElementById('auth-btn-icon');
            const btn = document.getElementById('btn-auth-action');

            if (currentRole === 'admin') {
                const password = document.getElementById('auth-password').value.trim();
                if (!email) return showMessage("Please enter your admin email!", true);
                if (!password) return showMessage("Please enter your admin password!", true);
                
                const originalText = btnText.innerText;
                btnText.innerText = "Verifying...";
                btnIcon.className = "fa-solid fa-spinner fa-spin text-lg text-[#023047]";
                btn.disabled = true;

                try {
                    const res = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, selected_role: 'admin', password: password })
                    });
                    const data = await res.json();
                    
                    if (res.ok && data.status === 'success') {
                        showMessage("Login successful!", false);
                        localStorage.setItem('uniMartToken', data.token);
                        localStorage.setItem('uniMartActiveUser', JSON.stringify(data.user));
                        localStorage.setItem('uniActiveRole', data.user.role);
                        
                        setTimeout(() => {
                            window.location.href = 'admin_dashboard.html';
                        }, 1000);
                    } else {
                        showMessage(data.detail || data.message || "Invalid admin credentials.", true);
                        btnText.innerText = originalText;
                        btnIcon.className = "fa-solid fa-right-to-bracket text-lg text-[#023047]";
                    }
                } catch (err) {
                    showMessage("Connection error. Please try again.", true);
                    btnText.innerText = originalText;
                    btnIcon.className = "fa-solid fa-right-to-bracket text-lg text-[#023047]";
                } finally {
                    btn.disabled = false;
                }
                return;
            }

            const name = document.getElementById('auth-name').value.trim();
            const phone = document.getElementById('auth-phone').value.trim();
            
            const otpContainer = document.getElementById('otp-input-container');
            const otpInput = document.getElementById('auth-otp');
            
            if (otpContainer.classList.contains('hidden')) {
                if (!name) return showMessage("Please enter your name!", true);
                if (!phone || phone.length !== 10) return showMessage("Please enter a valid 10-digit mobile number!", true);
                if (!email) return showMessage("Please enter your email address!", true);
                
                const originalText = btnText.innerText;
                btnText.innerText = "Sending Code...";
                btnIcon.className = "fa-solid fa-spinner fa-spin text-lg text-[#023047]";
                btn.disabled = true;
                
                try {
                    const res = await fetch(`${API_URL}/auth/request-otp`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, selected_role: currentRole })
                    });
                    const data = await res.json();
                    
                    if (res.ok && data.status === 'success') {
                        otpContainer.classList.remove('hidden');
                        
                        // Hide inputs
                        document.getElementById('name-input-container').classList.add('hidden');
                        document.getElementById('phone-input-container').classList.add('hidden');
                        document.getElementById('email-input-container').classList.add('hidden');
                        
                        btnText.innerText = "Verify & Login";
                        btnIcon.className = "fa-solid fa-check text-lg text-[#023047]";
                        
                        if (typeof emailjs !== 'undefined' && PUBLIC_KEY && SERVICE_ID && TEMPLATE_ID) {
                            const templateParams = {
                                to_email: email,
                                to_name: name,
                                otp_code: data.otp,
                                otp: data.otp,
                                verification_code: data.otp,
                                message: `Your Mekal Mart verification code is ${data.otp}`
                            };
                            emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams)
                                .then(() => {
                                    showMessage("Verification code sent to your email!", false);
                                }, (err) => {
                                    console.error("EmailJS Send Error:", err);
                                    showMessage("EmailJS failed to send. Developer fallback code: " + data.otp, false);
                                    otpInput.value = data.otp;
                                });
                        } else {
                            otpInput.value = data.otp;
                            showMessage("EmailJS not configured. Auto-filled code: " + data.otp, false);
                        }
                    } else {
                        showMessage(data.detail || data.message || "Failed to send code", true);
                        btnText.innerText = originalText;
                        btnIcon.className = "fa-solid fa-paper-plane text-lg text-[#023047]";
                    }
                } catch (err) {
                    showMessage("Connection error. Please try again.", true);
                    btnText.innerText = originalText;
                    btnIcon.className = "fa-solid fa-paper-plane text-lg text-[#023047]";
                } finally {
                    btn.disabled = false;
                }
            } else {
                const otpVal = otpInput.value.trim();
                if (otpVal.length !== 6) return showMessage("Enter the 6-digit verification code!", true);
                
                const originalText = btnText.innerText;
                btnText.innerText = "Verifying...";
                btnIcon.className = "fa-solid fa-spinner fa-spin text-lg text-[#023047]";
                btn.disabled = true;
                
                try {
                    const res = await fetch(`${API_URL}/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: email, otp: otpVal, selected_role: currentRole, name: name, phone: phone })
                    });
                    const data = await res.json();
                    
                    if (res.ok && data.status === 'success') {
                        showMessage("Login successful!", false);
                        localStorage.setItem('uniMartToken', data.token);
                        localStorage.setItem('uniMartActiveUser', JSON.stringify(data.user));
                        localStorage.setItem('uniActiveRole', data.user.role);
                        
                        setTimeout(() => {
                            if (data.user.role === 'admin') {
                                window.location.href = 'admin_dashboard.html';
                            } else if (data.user.role === 'vendor') {
                                window.location.href = 'vendor_dashboard.html';
                            } else if (data.user.role === 'partner' || data.user.role === 'delivery') {
                                window.location.href = 'delivery_dashboard.html';
                            } else {
                                window.location.href = 'index.html';
                            }
                        }, 1000);
                    } else {
                        showMessage(data.detail || data.message || "Login failed", true);
                        btnText.innerText = originalText;
                        btnIcon.className = "fa-solid fa-check text-lg text-[#023047]";
                    }
                } catch (err) {
                    showMessage("Connection error. Please try again.", true);
                    btnText.innerText = originalText;
                    btnIcon.className = "fa-solid fa-check text-lg text-[#023047]";
                } finally {
                    btn.disabled = false;
                }
            }
        }

        async function triggerMockLogin() {
            const email = prompt("Enter email for Mock login (Dev Bypass):", "user@example.com");
            if (!email) return;
            
            const nameVal = document.getElementById('auth-name') ? document.getElementById('auth-name').value.trim() : '';
            const phoneVal = document.getElementById('auth-phone') ? document.getElementById('auth-phone').value.trim() : '';
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: email,
                        otp: "123456",
                        selected_role: currentRole,
                        name: nameVal || email.split('@')[0],
                        phone: phoneVal || "9999999999"
                    })
                });
                const data = await res.json();
                if (res.ok && data.status === 'success') {
                    showMessage("Mock Login successful!", false);
                    localStorage.setItem('uniMartToken', data.token);
                    localStorage.setItem('uniMartActiveUser', JSON.stringify(data.user));
                    localStorage.setItem('uniActiveRole', data.user.role);
                    
                    setTimeout(() => {
                        if (data.user.role === 'admin') {
                            window.location.href = 'admin_dashboard.html';
                        } else if (data.user.role === 'vendor') {
                            window.location.href = 'vendor_dashboard.html';
                        } else if (data.user.role === 'partner' || data.user.role === 'delivery') {
                            window.location.href = 'delivery_dashboard.html';
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1000);
                } else {
                    showMessage(data.detail || "Mock registration failed", true);
                }
            } catch (e) {
                showMessage("Sync Error: " + e.message, true);
            }
        }
    </script>
</body>
</html>
